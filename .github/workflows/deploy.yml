name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    # Кажемо боту завжди заходити в папку проєкту
    defaults:
      run:
        working-directory: ./my-portfolio
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test

  deploy:
    name: Deploy to GitHub Pages
    needs: test 
    runs-on: ubuntu-latest
    # Тут теж кажемо боту заходити в папку
    defaults:
      run:
        working-directory: ./my-portfolio
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Вказуємо правильний шлях до зібраного сайту
          publish_dir: ./my-portfolio/dist
